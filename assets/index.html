<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>workflow</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/milligram/dist/milligram.min.css">
        <link rel="stylesheet" href="./assets/main.css">
    </head>
    <body>
        <div class="result" id="results"></div>
        <script>
            (async () => {
                const routes = ['/', '/no', '/yes', '/home', '/other']; // define routes to scan
                const resultEl = document.getElementById('results');
                const errors = [400,
                    404,
                    500,
                    502,
                    504,
                    505
                ];
                let output = '';
                for (const route of routes) {
                    try {
                        const res = await fetch(route);
                        const statusClass = errors.includes(res.status) ? 'error' : 'ok';
                        output += `
							<div class="card ${statusClass}">${route} → ${res.status}</div>`;
                    } catch (e) {
                        output += `
							<div class="card error">${route} → fetch failed</div>`;
                    }
                }
                resultEl.innerHTML = output;
            })();
        </script>
    </body>
</html>
