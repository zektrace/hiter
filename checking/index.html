<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workflow</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/milligram/dist/milligram.min.css">
<link rel="stylesheet" href="main.css">
<style>
	.card { padding: 1rem; margin: 0.5rem 0; background: #1e1e1e; border-radius: 6px; }
    .card.error { color: #ff5555; }
    .card.ok { color: #00e6ae; }
</style>
</head>
<body>
<div class="result" id="results"></div>

<script>
(async () => {
    const routes = ['/', '/1', '/2', '/3', '/4'];
    const resultEl = document.getElementById('results');
    const errors = [400,
					404,
					500,
					502,
					504,
					505
				];
    let output = '';
    const logs = [ // content:
	];
    for (const route of routes) {
        try {
            const res = await fetch(route);
            const statusClass = errors.includes(res.status) ? 'error' : 'ok';
            const line = `${route} → ${res.status}`;
            
            output += `<div class="card ${statusClass}">${line}</div>`; // add to page

            logs.push(line);
            console.log(line); // add to logs and console
        } catch (e) {
            const line = `${route} → fetch failed`;
            output += `<div class="card error">${line}</div>`;
            logs.push(line);
            console.error(line);
        }
    }
    resultEl.innerHTML = output;
    localStorage.setItem('httpLogs', JSON.stringify(logs));
	
    // info: to see logs in DevTools, open console manually
    console.info('HTTP scan complete. Logs stored in localStorage as "httpLogs".');
})();
</script>
</body>
</html>
